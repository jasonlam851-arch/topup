<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工系統 - 增值管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1c1c1e; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-white flex justify-center min-h-screen pb-10">

    <div class="w-full max-w-md p-4 flex flex-col pt-8">
        
        <div id="staff-auth" class="bg-gray-800 rounded-3xl p-8 shadow-lg mt-10">
            <h1 class="text-2xl font-bold mb-6 text-center">員工登入</h1>
            <div class="flex flex-col gap-4">
                <input type="text" id="staff-id" placeholder="員工帳號" class="p-3 bg-gray-700 rounded-xl outline-none text-white placeholder-gray-400">
                <input type="password" id="staff-pass" placeholder="密碼" class="p-3 bg-gray-700 rounded-xl outline-none text-white placeholder-gray-400">
                <button id="btn-staff-login" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl font-semibold mt-2 transition">系統登入</button>
                <p id="staff-error" class="text-red-400 text-sm text-center"></p>
            </div>
        </div>

        <div id="staff-dashboard" class="hidden flex flex-col gap-6">
            <div class="flex justify-between items-center px-2">
                <h1 class="text-xl font-bold">增值終端機</h1>
                <span class="text-gray-400 text-sm">員工: P001</span>
            </div>

            <div class="bg-gray-800 rounded-3xl p-4 shadow-lg">
                <h2 class="text-lg font-semibold mb-3 text-center">掃描客戶二維碼</h2>
                <div id="reader" class="w-full rounded-2xl overflow-hidden border-2 border-gray-700"></div>
            </div>

            <div id="topup-panel" class="hidden bg-gray-800 rounded-3xl p-6 shadow-lg">
                <h2 class="text-lg font-semibold mb-4 border-b border-gray-700 pb-2">客戶資訊</h2>
                <div class="flex justify-between mb-2">
                    <span class="text-gray-400">名稱:</span>
                    <span id="info-name" class="font-bold">---</span>
                </div>
                <div class="flex justify-between mb-2">
                    <span class="text-gray-400">電話:</span>
                    <span id="info-phone" class="font-bold">---</span>
                </div>
                <div class="flex justify-between mb-6">
                    <span class="text-gray-400">當前餘額:</span>
                    <span id="info-balance" class="font-bold text-green-400">$0.00</span>
                </div>

                <div class="flex flex-col gap-3">
                    <input type="number" id="topup-amount" placeholder="輸入增值金額" class="p-4 bg-gray-700 rounded-xl outline-none text-xl text-center font-bold text-white">
                    <button id="btn-submit-topup" class="bg-white text-black p-4 rounded-xl font-bold text-lg hover:bg-gray-200 transition">確認增值</button>
                    <p id="topup-msg" class="text-center text-sm font-semibold mt-2"></p>
                </div>
            </div>
            
            <button id="btn-reset-scan" class="hidden bg-gray-700 text-white p-3 rounded-xl font-semibold">重新掃描</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, update, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDnUjBwJkLhyvLGRVOHJuAWXLCV2F_WIg",
            authDomain: "apple-pay-1c569.firebaseapp.com",
            projectId: "apple-pay-1c569",
            storageBucket: "apple-pay-1c569.firebasestorage.app",
            messagingSenderId: "556609511982",
            appId: "1:556609511982:web:c5cd4cf609c220bacbf5bf",
            measurementId: "G-6MPCREG7GW",
            databaseURL: "https://apple-pay-1c569-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let html5QrcodeScanner;
        let targetUid = null;

        document.getElementById('btn-staff-login').addEventListener('click', async () => {
            const id = document.getElementById('staff-id').value;
            const pass = document.getElementById('staff-pass').value;
            
            if (id === 'P001' && pass === 'P001') {
                try {
                    await signInAnonymously(auth);
                    document.getElementById('staff-auth').classList.add('hidden');
                    document.getElementById('staff-dashboard').classList.remove('hidden');
                    initScanner();
                } catch (error) {
                    document.getElementById('staff-error').innerText = "系統連線錯誤。";
                }
            } else {
                document.getElementById('staff-error').innerText = "帳號或密碼錯誤。";
            }
        });

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        async function onScanSuccess(decodedText, decodedResult) {
            try {
                const data = JSON.parse(decodedText);
                if (data.type === "TOPUP" && data.uid) {
                    html5QrcodeScanner.clear();
                    document.getElementById('reader').classList.add('hidden');
                    
                    targetUid = data.uid;
                    await loadClientInfo(targetUid);
                } else {
                    alert("請掃描正確的「增值二維碼」。\n此二維碼類型為: " + (data.type || "未知"));
                }
            } catch (e) {
                console.log("非系統支援的二維碼格式。");
            }
        }

        function onScanFailure(error) {
        }

        async function loadClientInfo(uid) {
            const snapshot = await get(ref(db, 'users/' + uid));
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                document.getElementById('info-name').innerText = userData.name;
                document.getElementById('info-phone').innerText = userData.phone;
                document.getElementById('info-balance').innerText = `$${parseFloat(userData.balance).toFixed(2)}`;
                
                document.getElementById('topup-panel').classList.remove('hidden');
                document.getElementById('btn-reset-scan').classList.remove('hidden');
            } else {
                alert("找不到該客戶資料。");
                resetScanner();
            }
        }

        document.getElementById('btn-submit-topup').addEventListener('click', async () => {
            const amountInput = document.getElementById('topup-amount').value;
            const amount = parseFloat(amountInput);
            const msgEl = document.getElementById('topup-msg');
            
            if (isNaN(amount) || amount <= 0) {
                msgEl.innerText = "請輸入有效的增值金額。";
                msgEl.className = "text-center text-sm font-semibold mt-2 text-red-400";
                return;
            }

            msgEl.innerText = "處理中...";
            msgEl.className = "text-center text-sm font-semibold mt-2 text-blue-400";

            try {
                const userRef = ref(db, 'users/' + targetUid);
                const snapshot = await get(userRef);
                const currentBalance = parseFloat(snapshot.val().balance);
                const newBalance = currentBalance + amount;

                await update(userRef, {
                    balance: newBalance
                });

                await push(ref(db, 'logs'), {
                    userId: targetUid,
                    staffId: "P001",
                    amount: amount,
                    type: "TOPUP",
                    timestamp: serverTimestamp()
                });

                msgEl.innerText = "增值成功！";
                msgEl.className = "text-center text-sm font-semibold mt-2 text-green-400";
                document.getElementById('info-balance').innerText = `$${newBalance.toFixed(2)}`;
                document.getElementById('topup-amount').value = "";
                
            } catch (error) {
                msgEl.innerText = "增值失敗，請重試。";
                msgEl.className = "text-center text-sm font-semibold mt-2 text-red-400";
            }
        });

        document.getElementById('btn-reset-scan').addEventListener('click', resetScanner);

        function resetScanner() {
            targetUid = null;
            document.getElementById('topup-panel').classList.add('hidden');
            document.getElementById('btn-reset-scan').classList.add('hidden');
            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('topup-msg').innerText = "";
            document.getElementById('topup-amount').value = "";
            initScanner();
        }
    </script>
</body>
</html>
